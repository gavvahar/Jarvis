services:
  # ─── Offline-first: start with `docker compose --profile offline up -d` ──────
  # Then set provider=openai_compatible and base_url=http://ollama:11434/v1 in Settings.
  ollama:
    profiles: [offline]
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # ─── Snapcast multi-room audio — uncomment to add alongside Jarvis ───────────
  # snapcast:
  #   image: ghcr.io/badaix/snapcast:latest
  #   ports:
  #     - "1704:1704"   # audio stream port
  #     - "1705:1705"   # control port
  #     - "1780:1780"   # HTTP JSON-RPC (set SNAPCAST_URL=http://host:1780 in .env)
  #   volumes:
  #     - snapcast_data:/var/lib/snapserver
  #   restart: unless-stopped

  jarvis:
    build: .
    pull_policy: build
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      HOST_IP: ${HOST_IP:-}
    volumes:
      - ./static:/app/static
      - ./templates:/app/templates
      - ./python/app.py:/app/python/app.py
      - ./python/personality.py:/app/python/personality.py
    command:
      [
        "uvicorn",
        "app:app",
        "--host",
        "0.0.0.0",
        "--port",
        "5000",
        "--reload",
        "--app-dir",
        "python",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: jarvis
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis -d jarvis"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
  # snapcast_data:
