<div id="topbar" class="boot">
  <span><span class="dot-live"></span></span>
  <span class="sys-name">J·A·R·V·I·S</span>
  <span>v1.0</span>
  <span id="top-hex">0x7F3A1</span>
  <span
    >STATUS&nbsp;:&nbsp;<span id="top-status" style="color: var(--cyan-bright)"
      >ONLINE</span
    ></span
  >
  <button id="settings-btn" title="Settings">
    <svg
      viewBox="0 0 20 20"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <circle cx="10" cy="10" r="3" />
      <path
        d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M4.2 15.8l1.4-1.4M14.4 5.6l1.4-1.4"
      />
    </svg>
    SETTINGS
  </button>
  <button id="silent-btn" title="Toggle Silent Mode (text only, no mic/voice)">
    <svg
      viewBox="0 0 20 20"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <rect x="7.5" y="2" width="5" height="9" rx="2.5" />
      <path d="M4.5 9.5a5.5 5.5 0 0 0 8.9 4.3M15.5 9.5a5.5 5.5 0 0 1-.6 2.5" />
      <path d="M10 16v2M7 19h6" />
      <path d="M2.5 2.5l15 15" />
    </svg>
    SILENT
  </button>
  <button id="meeting-btn" title="Record Meeting Notes">
    <svg
      viewBox="0 0 20 20"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <rect x="7" y="2" width="6" height="10" rx="3" />
      <path d="M4 10c0 3.3 2.7 6 6 6s6-2.7 6-6M10 16v3M7 19h6" />
    </svg>
    MEETING
  </button>
  <button id="party-btn" title="Toggle Party Mode">
    <svg
      viewBox="0 0 20 20"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <path d="M10 2l1.5 5.5L17 10l-5.5 1.5L10 17l-1.5-5.5L3 10l5.5-1.5z" />
    </svg>
    PARTY
  </button>
  <button id="party-qr-btn" title="Show Queue QR Code" style="display: none">
    <svg
      viewBox="0 0 20 20"
      width="13"
      height="13"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <rect x="3" y="3" width="6" height="6" />
      <rect x="11" y="3" width="6" height="6" />
      <rect x="3" y="11" width="6" height="6" />
      <rect x="13" y="13" width="2" height="2" />
      <rect x="11" y="11" width="2" height="2" />
      <rect x="15" y="11" width="2" height="2" />
      <rect x="11" y="15" width="4" height="2" />
    </svg>
    QR
  </button>
</div>
