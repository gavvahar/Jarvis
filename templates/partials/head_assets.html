<!-- Tune the orb for the device: mobile gets fewer particles + a lower
     frame cap to stay smooth on GPU-limited hardware. -->
<script>
  var _mobile =
    window.innerWidth <= 480 || /Mobi|Android/i.test(navigator.userAgent);
  window.__orbCount = _mobile ? 5000 : 18000;
  window.__orbMaxFps = _mobile ? 30 : 45;
  window.__device = _mobile ? "mobile" : "pc";
</script>
