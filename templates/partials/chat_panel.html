<div id="chat-panel" class="chat-hidden" data-screen-label="Chat Tab">
  <div class="chat-head" id="chat-head">
    <span class="chat-title"
      ><span class="chat-dot"></span>DIRECT LINK · SECURE</span
    >
    <span class="chat-grip" aria-hidden="true"></span>
    <button class="chat-close" id="chat-close" aria-label="Close comms">
      <svg viewBox="0 0 16 16" width="13" height="13">
        <path
          d="M3 3 L13 13 M13 3 L3 13"
          stroke="currentColor"
          stroke-width="1.6"
          fill="none"
        />
      </svg>
    </button>
  </div>
  <div class="chat-log" id="chat-log"></div>
  <div class="chat-typing" id="chat-typing">
    <span></span><span></span><span></span>
  </div>
  <form class="chat-input" id="chat-form" autocomplete="off">
    <input
      id="chat-text"
      type="text"
      placeholder="Message J.A.R.V.I.S…"
      autocomplete="off"
    />
    <button type="submit" class="chat-send" aria-label="Send">
      <svg viewBox="0 0 20 20" width="16" height="16">
        <path d="M2 10 L18 3 L11 18 L9 11 Z" fill="currentColor" />
      </svg>
    </button>
  </form>
</div>
