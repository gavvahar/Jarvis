      <div id="ha-settings" class="setup-hidden">
        <div id="ha-settings-card" class="setup-card-inner">
          <div class="setup-ring"></div>
          <div class="setup-word">SETTINGS</div>
          <div class="setup-sub">HOME AUTOMATION</div>
          <form id="ha-settings-form" autocomplete="off">
            <label class="setup-label" for="ha-url">HOME ASSISTANT URL</label>
            <input
              id="ha-url"
              type="text"
              placeholder="http://homeassistant.local:8123"
              autocomplete="off"
              spellcheck="false"
            />
            <label class="setup-label" for="ha-token" style="margin-top: 10px"
              >LONG-LIVED ACCESS TOKEN</label
            >
            <input
              id="ha-token"
              type="password"
              placeholder="Leave blank to keep existing token"
              autocomplete="off"
              spellcheck="false"
            />
            <div id="ha-status-row">
              <span id="ha-status-dot"></span>
              <span id="ha-status-text">—</span>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 14px">
              <button type="submit" id="ha-save">SAVE</button>
              <button type="button" id="ha-cancel">CANCEL</button>
            </div>
          </form>
          <div id="ha-msg"></div>
        </div>
      </div>
