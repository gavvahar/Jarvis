name: Auto-Fix on Test Failure

on:
  workflow_run:
    workflows: ["Code Quality"]
    types: [completed]

jobs:
  fix-and-report:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Attempt auto-format
        id: format
        shell: bash
        run: |
          set -o pipefail
          tox -e format 2>&1 | tee /tmp/format_output.txt
        continue-on-error: true

      - name: Commit and push fixes
        if: steps.format.outcome == 'success'
        run: |
          make commit
          git push

      - name: Verify fix with tox -e github
        id: verify
        if: steps.format.outcome == 'success'
        shell: bash
        run: |
          set -o pipefail
          tox -e github 2>&1 | tee /tmp/verify_output.txt
        continue-on-error: true

      - name: Create failure issue
        if: steps.format.outcome == 'failure' || steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        env:
          FORMAT_OUTCOME: ${{ steps.format.outcome }}
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          script: |
            const fs = require('fs');

            // GITHUB_TOKEN can't access user-level ProjectV2 boards, so this needs
            // its own octokit authenticated with a PAT (same as pr-description.yml's
            // "Add PR to project" step) rather than the default `github` client.
            async function addIssueToProject(issueNodeId) {
              const { getOctokit } = require('@actions/github');
              const octokit = getOctokit(process.env.GH_PAT);
              try {
                const owner = context.repo.owner;
                const { user } = await octokit.graphql(
                  `query($owner: String!, $number: Int!) {
                    user(login: $owner) { projectV2(number: $number) { id } }
                  }`,
                  { owner, number: 9 }
                );
                const projectId = user.projectV2.id;

                const { addProjectV2ItemById } = await octokit.graphql(
                  `mutation($pid: ID!, $cid: ID!) {
                    addProjectV2ItemById(input: {projectId: $pid, contentId: $cid}) {
                      item { id }
                    }
                  }`,
                  { pid: projectId, cid: issueNodeId }
                );
                const itemId = addProjectV2ItemById.item.id;

                const { node } = await octokit.graphql(
                  `query($pid: ID!) {
                    node(id: $pid) {
                      ... on ProjectV2 {
                        fields(first: 20) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }`,
                  { pid: projectId }
                );

                const PREFERRED = ['todo', 'backlog', 'in progress'];
                const statusField = node.fields.nodes.find(f => (f.name || '').toLowerCase() === 'status');
                if (!statusField) return;
                const opts = Object.fromEntries((statusField.options || []).map(o => [o.name.toLowerCase(), o]));
                const bestOption = PREFERRED.map(p => opts[p]).find(Boolean) || statusField.options[0];
                if (!bestOption) return;

                await octokit.graphql(
                  `mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $pid, itemId: $iid, fieldId: $fid,
                      value: { singleSelectOptionId: $oid }
                    }) { projectV2Item { id } }
                  }`,
                  { pid: projectId, iid: itemId, fid: statusField.id, oid: bestOption.id }
                );
              } catch (e) {
                console.log(`Could not add issue to project: ${e.message}`);
              }
            }
            const branch = context.payload.workflow_run.head_branch;
            const fullSha = context.payload.workflow_run.head_sha;
            const shortSha = fullSha.substring(0, 7);
            const failedRunUrl = context.payload.workflow_run.html_url;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${fullSha}`;
            const thisRunUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const metaTable = [
              '| | |',
              '|---|---|',
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | [${shortSha}](${commitUrl}) |`,
              `| **Failed Test Run** | [View logs](${failedRunUrl}) |`,
              `| **This Fix Attempt** | [View logs](${thisRunUrl}) |`,
            ].join('\n');

            let body;
            if (process.env.FORMAT_OUTCOME === 'failure') {
              const output = fs.readFileSync('/tmp/format_output.txt', 'utf8').trim();
              body = [
                '## CI Failure Report',
                '',
                'The **Code Quality** workflow failed. An automatic `tox -e format` fix was attempted but also failed.',
                'Manual intervention is required.',
                '',
                metaTable,
                '',
                '---',
                '',
                '### Auto-Format Failure Output (`tox -e format`)',
                '',
                '```',
                output,
                '```',
              ].join('\n');
            } else {
              const output = fs.readFileSync('/tmp/verify_output.txt', 'utf8').trim();
              body = [
                '## CI Failure Report',
                '',
                'The **Code Quality** workflow failed. An automatic `tox -e format` fix was applied and pushed,',
                'but `tox -e github` still fails after the fix. Manual intervention is required.',
                '',
                metaTable,
                '',
                '---',
                '',
                '### `tox -e github` Output After Auto-Fix',
                '',
                '```',
                output,
                '```',
              ].join('\n');
            }

            const actor = context.payload.workflow_run.actor?.login;

            // Create the label if it doesn't exist yet (422 = already exists, safe to ignore)
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ci-failure',
                color: 'd93f0b',
                description: 'CI pipeline failure requiring manual fix',
              });
            } catch (e) {}

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI: tests and auto-format failed on \`${branch}\` (${shortSha})`,
              body,
              assignees: actor ? [actor] : [],
              labels: ['ci-failure'],
            });
            await addIssueToProject(created.data.node_id);

      - name: Report non-format CI failures
        uses: actions/github-script@v7
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          script: |
            // GITHUB_TOKEN can't access user-level ProjectV2 boards, so this needs
            // its own octokit authenticated with a PAT (same as pr-description.yml's
            // "Add PR to project" step) rather than the default `github` client.
            async function addIssueToProject(issueNodeId) {
              const { getOctokit } = require('@actions/github');
              const octokit = getOctokit(process.env.GH_PAT);
              try {
                const owner = context.repo.owner;
                const { user } = await octokit.graphql(
                  `query($owner: String!, $number: Int!) {
                    user(login: $owner) { projectV2(number: $number) { id } }
                  }`,
                  { owner, number: 9 }
                );
                const projectId = user.projectV2.id;

                const { addProjectV2ItemById } = await octokit.graphql(
                  `mutation($pid: ID!, $cid: ID!) {
                    addProjectV2ItemById(input: {projectId: $pid, contentId: $cid}) {
                      item { id }
                    }
                  }`,
                  { pid: projectId, cid: issueNodeId }
                );
                const itemId = addProjectV2ItemById.item.id;

                const { node } = await octokit.graphql(
                  `query($pid: ID!) {
                    node(id: $pid) {
                      ... on ProjectV2 {
                        fields(first: 20) {
                          nodes {
                            ... on ProjectV2SingleSelectField { id name options { id name } }
                          }
                        }
                      }
                    }
                  }`,
                  { pid: projectId }
                );

                const PREFERRED = ['todo', 'backlog', 'in progress'];
                const statusField = node.fields.nodes.find(f => (f.name || '').toLowerCase() === 'status');
                if (!statusField) return;
                const opts = Object.fromEntries((statusField.options || []).map(o => [o.name.toLowerCase(), o]));
                const bestOption = PREFERRED.map(p => opts[p]).find(Boolean) || statusField.options[0];
                if (!bestOption) return;

                await octokit.graphql(
                  `mutation($pid: ID!, $iid: ID!, $fid: ID!, $oid: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $pid, itemId: $iid, fieldId: $fid,
                      value: { singleSelectOptionId: $oid }
                    }) { projectV2Item { id } }
                  }`,
                  { pid: projectId, iid: itemId, fid: statusField.id, oid: bestOption.id }
                );
              } catch (e) {
                console.log(`Could not add issue to project: ${e.message}`);
              }
            }

            // 'quality' is the only job auto-format can fix; everything else needs a manual fix
            const autoFixable = new Set(['quality']);

            const { data: { jobs } } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const failed = jobs.filter(j => j.conclusion === 'failure' && !autoFixable.has(j.name));
            if (!failed.length) return;

            const branch = context.payload.workflow_run.head_branch;
            const fullSha = context.payload.workflow_run.head_sha;
            const shortSha = fullSha.substring(0, 7);
            const failedRunUrl = context.payload.workflow_run.html_url;
            const commitUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${fullSha}`;

            const jobRows = failed
              .map(j => `| \`${j.name}\` | [View logs](${j.html_url}) |`)
              .join('\n');

            const body = [
              '## CI Failure Report',
              '',
              'The following jobs in **Code Quality** failed and cannot be auto-fixed:',
              '',
              '| Job | Logs |',
              '|-----|------|',
              jobRows,
              '',
              '| | |',
              '|---|---|',
              `| **Branch** | \`${branch}\` |`,
              `| **Commit** | [${shortSha}](${commitUrl}) |`,
              `| **Failed Run** | [View logs](${failedRunUrl}) |`,
            ].join('\n');

            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'ci-failure',
                color: 'd93f0b',
                description: 'CI pipeline failure requiring manual fix',
              });
            } catch (e) {}

            const actor = context.payload.workflow_run.actor?.login;
            const jobNames = failed.map(j => j.name).join(', ');
            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `CI: ${jobNames} failed on \`${branch}\` (${shortSha})`,
              body,
              assignees: actor ? [actor] : [],
              labels: ['ci-failure'],
            });
            await addIssueToProject(created.data.node_id);

  auto-close:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close resolved ci-failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const fullSha = context.payload.workflow_run.head_sha;
            const shortSha = fullSha.substring(0, 7);
            const runUrl = context.payload.workflow_run.html_url;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ci-failure',
            });

            const matching = issues.filter(i => i.title.includes(`\`${branch}\``));

            for (const issue of matching) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  '## Resolved',
                  '',
                  `**Code Quality** passed on \`${branch}\` at [${shortSha}](${runUrl}).`,
                  'Closing automatically.',
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
