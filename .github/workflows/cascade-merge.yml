name: Cascade Merge

on:
  push:
    branches:
      - staging
      - main

jobs:
  cascade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Cascade merge into all branches
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          SOURCE_BRANCH: ${{ github.ref_name }}
        run: python3 .github/scripts/cascade_merge.py
