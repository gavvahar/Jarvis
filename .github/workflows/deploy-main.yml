name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest changes
        run: git pull

      - name: Restart stack
        run: |
          docker compose pull
          docker compose up -d
          docker system prune -fa

      - name: Wait for app to be healthy
        run: curl --retry 30 --retry-all-errors --retry-delay 5 -sf http://localhost:5000/login -o /dev/null

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs
