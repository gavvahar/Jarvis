name: Code Quality

on:
  push:
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run actionlint
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VER=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/rhysd/actionlint/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" \
            | tar -xz -C /tmp actionlint
          /tmp/actionlint

  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.6"

      - name: Build Android APK (debug)
        working-directory: android
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug --no-daemon

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Audit Python dependencies for CVEs
        run: |
          pip install pip-audit -q
          pip-audit -r requirements/standard/requirements.txt

  docker-build:
    runs-on: [self-hosted, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag jarvis:ci .

  compose-validate:
    runs-on: [self-hosted, homelab]
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose config
        run: |
          touch .env
          docker compose config --quiet

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Python3
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: "pip"

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox

      - name: Run tox (github)
        run: tox -e github

  daemon-test:
    runs-on: [self-hosted, arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Install daemon dependencies
        run: pip3 install -r requirements/daemon/requirements.txt

      - name: Verify ARM-specific packages import correctly
        run: python3 -c "import onnxruntime, sounddevice; print('daemon deps OK')"
