name: Auto Merge Staging to Main

on:
  schedule:
    # Mon/Wed/Fri 12am EDT (UTC-4). GitHub Actions cron has no DST awareness,
    # so during EST (Nov-Mar) this runs at 11pm EST instead of 12am - a ~4-month,
    # 1-hour drift that's preferable to firing twice year-round.
    - cron: "0 4 * * 1,3,5"
  workflow_dispatch: # Allow manual trigger

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge staging into main
        run: |
          git checkout main
          if git merge-base --is-ancestor origin/staging HEAD; then
            echo "staging is already merged into main, nothing to do"
            exit 0
          fi
          git merge --no-ff origin/staging -m "chore: auto-merge staging into main [$(date -u '+%B %-d, %Y')]"
          git push https://x-access-token:${{ secrets.GH_PAT }}@github.com/gavvahar/Jarvis.git main
