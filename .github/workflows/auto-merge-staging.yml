name: Auto Merge Staging to Main

on:
  schedule:
    - cron: "0 12 * * 1,3,5" # Mon/Wed/Fri 7am EST (UTC-5, Nov–Mar)
    - cron: "0 11 * * 1,3,5" # Mon/Wed/Fri 7am EDT (UTC-4, Mar–Nov)
  workflow_dispatch: # Allow manual trigger

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge staging into main
        run: |
          git checkout main
          git merge --no-ff origin/staging -m "chore: auto-merge staging into main [$(date -u '+%Y-%m-%d')]"
          git push origin main
