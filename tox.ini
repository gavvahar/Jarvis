[tox]
envlist = lint, txt-lint, format, prettier
toxworkdir=/tmp/.tox

[testenv]
passenv = PATH
setenv =
    VIRTUALENV_OVERRIDE_APP_DATA = {toxworkdir}/.virtualenv

[testenv:lint]
basepython = python3
deps = ruff
commands = ruff check --no-cache .

[testenv:txt-lint]
skip_install = true
allowlist_externals =
    npx
    npm
commands =
    npm install --save-dev textlint textlint-rule-common-misspellings textlint-rule-write-good
    npx textlint --rule common-misspellings --rule write-good "**/*.txt"


[testenv:format]
deps =
    black
allowlist_externals = npx
commands =
    black .
    npx prettier --write "**/*.{css,js,html,json,yml,yaml,md}"

[testenv:no-classes-check]
skip_install = true
deps =
exclude =
    test.py
commands =
    python3 scripts/no_classes_check.py

[testenv:prettier]
skip_install = true
allowlist_externals = npx
commands =
    npx prettier --check "**/*.{css,js,html,json,yml,yaml,md}"

# Aggregate env: runs format, no-classes-check, and lint in order
[testenv:all]
skip_install = true
deps =
allowlist_externals = tox
commands =
    tox -e format
    tox -e github

[testenv:github]
skip_install = true
deps =
allowlist_externals = tox
commands =
    tox -e no-classes-check
    tox -e lint
    tox -e txt-lint
    tox -e prettier