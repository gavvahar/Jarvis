# =============================================================================
# GIT-CLIFF — PR description generator
# =============================================================================

[tool.git-cliff.changelog]
header = ""
body = """
## Summary
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }}
{%- endfor %}
{% endfor %}

## Test plan

- [ ] Review the changes above
- [ ] Existing tests pass
"""
trim = true

[tool.git-cliff.git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "✨ Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^docs", group = "📚 Documentation" },
  { message = "^refactor", group = "♻️ Refactoring" },
  { message = "^test", group = "🧪 Tests" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^chore", group = "🔧 Chores" },
  { message = "^lint", group = "🔧 Chores" },
  { message = ".*", group = "📝 Changes" },
]

# =============================================================================
# RUFF — Python linter & formatter
# =============================================================================

[tool.ruff]
line-length = 180
exclude = ["__pycache__", "venv", ".tox", ".venv", "tests.py", "env"]

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E203", "E501", "E701", "E401", "B008"]

# =============================================================================
# TY — Static type checker
# =============================================================================

[tool.ty.rules]
# Third-party packages live in Docker/conda, not the tox lint venv
unresolved-import = "ignore"
# **kwargs spreading into OpenAI/starlette constructors produces false positives
invalid-argument-type = "ignore"

# =============================================================================
# PYTEST
# =============================================================================

[tool.pytest.ini_options]
pythonpath = ["python"]
testpaths = ["python/tests"]

# =============================================================================
# TOX — Test & task runner
# =============================================================================

# Default envs run when you type `tox` with no arguments
[tool.tox]
env_list = ["lint", "txt-lint", "format", "prettier", "toml-lint"]
work_dir = "/tmp/.tox"

# Shared base config inherited by all envs
[tool.tox.env_run_base]
pass_env = ["PATH"]
set_env = { VIRTUALENV_OVERRIDE_APP_DATA = "{work_dir}/.virtualenv", PYTHONDONTWRITEBYTECODE = "1" }

# --- Linting ----------------------------------------------------------------

[tool.tox.env.lint]
skip_install = true
base_python = "python3"
deps = ["ruff"]
commands = [["ruff", "check", "--no-cache", "."]]

[tool.tox.env."txt-lint"]
skip_install = true
allowlist_externals = ["npx", "npm"]
commands = [
  [
    "npm",
    "install",
    "--save-dev",
    "textlint",
    "textlint-rule-common-misspellings",
    "textlint-rule-write-good",
  ],
  [
    "npx",
    "textlint",
    "--rule",
    "common-misspellings",
    "--rule",
    "write-good",
    "**/*.txt",
  ],
]

[tool.tox.env."no-classes-check"]
skip_install = true
deps = []
commands = [["python3", "python/scripts/no_classes_check.py"]]

# --- Formatting -------------------------------------------------------------

[tool.tox.env.format]
skip_install = true
deps = ["ruff", "ty"]
allowlist_externals = ["npx"]
commands = [
  [
    "ruff",
    "format",
    "--no-cache",
    "--verbose",
    ".",
  ],
  [
    "ruff",
    "check",
    "--no-cache",
    "--fix",
    "--verbose",
    ".",
  ],
  [
    "npx",
    "prettier",
    "--write",
    "--log-level",
    "log",
    "**/*.{css,js,html,json,yml,yaml,md}",
  ],
  [
    "npx",
    "@taplo/cli",
    "fmt",
    "--no-auto-config",
    "**/*.toml",
  ],
]

[tool.tox.env.prettier]
skip_install = true
allowlist_externals = ["npx"]
commands = [
  [
    "npx",
    "prettier",
    "--check",
    "**/*.{css,js,html,json,yml,yaml,md}",
  ],
]

[tool.tox.env."toml-lint"]
skip_install = true
allowlist_externals = ["npx"]
commands = [
  [
    "npx",
    "@taplo/cli",
    "fmt",
    "--check",
    "--no-auto-config",
    "**/*.toml",
  ],
  [
    "npx",
    "@taplo/cli",
    "lint",
    "--no-auto-config",
    "**/*.toml",
  ],
]

# --- Testing ----------------------------------------------------------------

[tool.tox.env.tests]
skip_install = true
deps = [
  "-r requirements/standard/requirements.txt",
  "pytest",
  "pytest-cov",
  "httpx",
]
commands = [
  [
    "pytest",
    "python/tests/",
    "-v",
    "--cov=app",
    "--cov=integrations",
    "--cov=db",
    "--cov=auth",
    "--cov-report=term-missing",
    "--cov-fail-under=50",
  ],
]

# --- Aggregate (CI) ---------------------------------------------------------

# Runs the full CI chain: no-classes-check → lint → txt-lint → prettier → tests
[tool.tox.env.github]
skip_install = true
deps = []
allowlist_externals = ["tox"]
commands = [
  [
    "tox",
    "-e",
    "no-classes-check",
  ],
  [
    "tox",
    "-e",
    "lint",
  ],
  [
    "tox",
    "-e",
    "txt-lint",
  ],
  [
    "tox",
    "-e",
    "prettier",
  ],
  [
    "tox",
    "-e",
    "toml-lint",
  ],
  [
    "tox",
    "-e",
    "tests",
  ],
]

# Runs format then the full github chain
[tool.tox.env.all]
skip_install = true
deps = []
allowlist_externals = ["tox"]
commands = [["tox", "-e", "format"], ["tox", "-e", "github"]]
