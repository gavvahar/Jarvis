[tool.ruff]
line-length = 180
exclude = ["__pycache__", "venv", ".tox", ".venv", "tests.py", "env"]

[tool.ruff.lint]
select = ["E", "F", "B"]
ignore = ["E203", "E501", "E701", "E401", "B008"]

[tool.ty.rules]
# Third-party packages live in Docker/conda, not the tox lint venv
unresolved-import = "ignore"
# **kwargs spreading into OpenAI/starlette constructors produces false positives
invalid-argument-type = "ignore"

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]

[tool.tox]
env_list = ["lint", "txt-lint", "format", "prettier"]
work_dir = "/tmp/.tox"

[tool.tox.env_run_base]
pass_env = ["PATH"]
set_env = { VIRTUALENV_OVERRIDE_APP_DATA = "{work_dir}/.virtualenv" }

[tool.tox.env.lint]
base_python = "python3"
deps = ["ruff", "ty"]
commands = [["ruff", "check", "--no-cache", "."], ["ty", "check", "app.py"]]

[tool.tox.env."txt-lint"]
skip_install = true
allowlist_externals = ["npx", "npm"]
commands = [
    ["npm", "install", "--save-dev", "textlint", "textlint-rule-common-misspellings", "textlint-rule-write-good"],
    ["npx", "textlint", "--rule", "common-misspellings", "--rule", "write-good", "**/*.txt"],
]

[tool.tox.env.format]
deps = ["ruff", "ty"]
allowlist_externals = ["npx"]
commands = [
    ["ruff", "format", "."],
    ["npx", "prettier", "--write", "**/*.{css,js,html,json,yml,yaml,md}"],
]

[tool.tox.env."no-classes-check"]
skip_install = true
deps = []
commands = [["python3", "scripts/no_classes_check.py"]]

[tool.tox.env.prettier]
skip_install = true
allowlist_externals = ["npx"]
commands = [["npx", "prettier", "--check", "**/*.{css,js,html,json,yml,yaml,md}"]]

[tool.tox.env.all]
skip_install = true
deps = []
allowlist_externals = ["tox"]
commands = [["tox", "-e", "format"], ["tox", "-e", "github"]]

[tool.tox.env.tests]
deps = ["-r requirements.txt", "pytest", "pytest-cov", "httpx"]
commands = [["pytest", "tests/", "-v", "--cov=app", "--cov-report=term-missing", "--cov-fail-under=25"]]

[tool.tox.env.github]
skip_install = true
deps = []
allowlist_externals = ["tox"]
commands = [
    ["tox", "-e", "no-classes-check"],
    ["tox", "-e", "lint"],
    ["tox", "-e", "txt-lint"],
    ["tox", "-e", "prettier"],
    ["tox", "-e", "tests"],
]
